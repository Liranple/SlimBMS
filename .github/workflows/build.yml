name: Build Windows app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:      # allow manual runs from the Actions tab

permissions:
  contents: write      # allow attaching the build to a Release on tag builds

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # Folder (onedir) build: DLLs sit next to the exe and load directly, so
      # there is no per-launch temp extraction (fast start, and no "Failed to
      # load Python DLL" race after a self-update replaces the files).
      - name: Build app (onedir)
        run: >
          pyinstaller --noconfirm --windowed --name SlimBMS
          --icon slimbms.ico
          --exclude-module PySide6.QtWebEngineCore
          --exclude-module PySide6.QtWebEngineWidgets
          --exclude-module PySide6.QtWebEngineQuick
          --exclude-module PySide6.QtWebEngine
          --exclude-module PySide6.QtQuick
          --exclude-module PySide6.QtQuick3D
          --exclude-module PySide6.QtQml
          --exclude-module PySide6.Qt3DCore
          --exclude-module PySide6.QtMultimedia
          --exclude-module PySide6.QtCharts
          --exclude-module PySide6.QtDataVisualization
          --exclude-module PySide6.QtPdf
          --exclude-module PySide6.QtNetwork
          --exclude-module PySide6.QtPositioning
          --exclude-module PySide6.QtSensors
          main.py

      - name: Zip app folder
        run: powershell Compress-Archive -Path dist/SlimBMS -DestinationPath SlimBMS-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlimBMS-windows
          path: SlimBMS-windows.zip

      - name: Attach build to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SlimBMS-windows.zip
